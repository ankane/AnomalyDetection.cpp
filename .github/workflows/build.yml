name: build
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest] #ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - run: cmake -S . -B build --config=Release -DCMAKE_VERBOSE_MAKEFILE=ON
      - run: cmake --build build
      - run: build/test
      - run: build/example
